<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnosticien Pédagogique — CP1 → CM2 (Guinée)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<script src="data.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  @media print {
    body * { visibility: hidden; }
    #printable-area, #printable-area * { visibility: visible; }
    #printable-area {
      position: absolute; left: 0; top: 0; width: 100%; padding: 1.5rem;
    }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect } = React;

const NIVEAUX = ["CP1", "CP2", "CE1", "CE2", "CM1", "CM2"];

const colors = { bg: "#f0faf4", card: "#ffffff", primary: "#2d6a4f", accent: "#52b788", light: "#d8f3dc", dark: "#1b4332", muted: "#74c69d" };

function Header({ view, setView }) {
  return (
    <div className="no-print" style={{ background: colors.primary, color: "white", padding: "1.5rem 2rem", boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
      <div style={{ maxWidth: 1000, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.8rem", marginBottom: "0.3rem" }}>
          <span style={{ fontSize: "1.8rem" }}>🎓</span>
          <h1 style={{ margin: 0, fontSize: "1.4rem", fontWeight: 700, letterSpacing: "-0.01em" }}>Diagnosticien Pédagogique</h1>
        </div>
        <p style={{ margin: "0 0 0.8rem", fontSize: "0.88rem", opacity: 0.85 }}>Tests diagnostiques CP1 → CM2 · Programmes guinéens INRAP</p>
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <button onClick={() => setView("tests")}
            style={{ background: view === "tests" ? "white" : "rgba(255,255,255,0.15)", color: view === "tests" ? colors.primary : "white", border: "1.5px solid rgba(255,255,255,0.4)", borderRadius: 8, padding: "0.45rem 0.9rem", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer" }}>
            📝 Tests diagnostiques
          </button>
          <button onClick={() => setView("remediation")}
            style={{ background: view === "remediation" ? "white" : "rgba(255,255,255,0.15)", color: view === "remediation" ? colors.primary : "white", border: "1.5px solid rgba(255,255,255,0.4)", borderRadius: 8, padding: "0.45rem 0.9rem", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer" }}>
            🔧 Plans de remédiation
          </button>
        </div>
      </div>
    </div>
  );
}

function NiveauSelector({ niveau, setNiveau }) {
  return (
    <div className="no-print" style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: "0.5rem", marginBottom: "1.5rem" }}>
      {NIVEAUX.map(n => (
        <button key={n} onClick={() => setNiveau(n)}
          style={{ background: niveau === n ? colors.primary : "white", color: niveau === n ? "white" : colors.dark, border: `2px solid ${niveau === n ? colors.primary : colors.light}`, borderRadius: 10, padding: "0.7rem 0.4rem", cursor: "pointer", fontWeight: 700, fontSize: "0.95rem", transition: "all 0.15s" }}>
          {n}
        </button>
      ))}
    </div>
  );
}

function ExerciceCard({ exercice }) {
  return (
    <div style={{ border: `1px solid ${colors.light}`, borderRadius: 10, padding: "1rem 1.2rem", marginBottom: "0.8rem", background: "white" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "0.4rem" }}>
        <h4 style={{ margin: 0, fontSize: "0.95rem", color: colors.primary, fontWeight: 700 }}>{exercice.nom}</h4>
      </div>
      <p style={{ margin: "0 0 0.5rem", fontSize: "0.85rem", color: "#666", fontStyle: "italic" }}>{exercice.consigne}</p>
      <div style={{ background: colors.bg, borderRadius: 8, padding: "0.7rem 0.9rem", marginBottom: "0.5rem", whiteSpace: "pre-line", fontSize: "0.92rem", color: colors.dark, lineHeight: 1.6 }}>
        {exercice.contenu}
      </div>
      <details style={{ fontSize: "0.85rem" }}>
        <summary style={{ cursor: "pointer", color: colors.accent, fontWeight: 600 }}>Grille de correction</summary>
        <p style={{ margin: "0.4rem 0 0", color: colors.dark, whiteSpace: "pre-line" }}>{exercice.correction}</p>
      </details>
    </div>
  );
}

function TestView({ niveau }) {
  const test = TESTS_DATA[niveau];
  const totalPoints = test.sections.reduce((sum, s) => sum + s.exercices.reduce((s2, e) => s2 + e.points, 0), 0);

  return (
    <div id="printable-area">
      <div style={{ background: "white", borderRadius: 12, padding: "1.5rem 1.6rem", marginBottom: "1.2rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderLeft: `4px solid ${colors.accent}` }}>
        <h2 style={{ margin: "0 0 0.6rem", color: colors.primary, fontSize: "1.3rem" }}>Test diagnostique — {test.niveau}</h2>
        <table style={{ width: "100%", fontSize: "0.88rem", marginBottom: "0.5rem" }}>
          <tbody>
            <tr><td style={{ padding: "0.2rem 0", color: "#888", width: "140px" }}>Durée</td><td style={{ fontWeight: 600 }}>{test.duree}</td></tr>
            <tr><td style={{ padding: "0.2rem 0", color: "#888" }}>Barème total</td><td style={{ fontWeight: 600 }}>/{totalPoints}</td></tr>
          </tbody>
        </table>
        <p style={{ margin: 0, fontSize: "0.88rem", color: colors.dark }}><strong>Objectif :</strong> {test.objectif}</p>
      </div>

      {test.sections.map((section, si) => (
        <div key={si} style={{ marginBottom: "1.3rem" }}>
          <h3 style={{ color: colors.primary, fontSize: "1.05rem", borderBottom: `2px solid ${colors.light}`, paddingBottom: "0.4rem", marginBottom: "0.8rem" }}>{section.titre}</h3>
          {section.exercices.map((ex, ei) => <ExerciceCard key={ei} exercice={ex} />)}
        </div>
      ))}

      <div style={{ background: "white", borderRadius: 12, padding: "1.2rem 1.4rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
        <h3 style={{ margin: "0 0 0.8rem", color: colors.primary, fontSize: "1.05rem" }}>Tableau de synthèse</h3>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.88rem" }}>
            <thead>
              <tr style={{ background: colors.primary, color: "white" }}>
                <th style={{ padding: "0.5rem 0.8rem", textAlign: "left" }}>Section</th>
                <th style={{ padding: "0.5rem 0.8rem", textAlign: "left" }}>Points</th>
                <th style={{ padding: "0.5rem 0.8rem", textAlign: "left" }}>Acquis (≥80%)</th>
                <th style={{ padding: "0.5rem 0.8rem", textAlign: "left" }}>En cours (50-79%)</th>
                <th style={{ padding: "0.5rem 0.8rem", textAlign: "left" }}>Non acquis (&lt;50%)</th>
              </tr>
            </thead>
            <tbody>
              {test.sections.map((s, i) => {
                const pts = s.exercices.reduce((sum, e) => sum + e.points, 0);
                return (
                  <tr key={i} style={{ background: i % 2 === 0 ? colors.bg : "white" }}>
                    <td style={{ padding: "0.5rem 0.8rem", border: `1px solid ${colors.light}` }}>{s.titre.replace(/PARTIE \d+ — /, "")}</td>
                    <td style={{ padding: "0.5rem 0.8rem", border: `1px solid ${colors.light}` }}>/{pts}</td>
                    <td style={{ padding: "0.5rem 0.8rem", border: `1px solid ${colors.light}` }}>≥ {Math.round(pts * 0.8)}</td>
                    <td style={{ padding: "0.5rem 0.8rem", border: `1px solid ${colors.light}` }}>{Math.round(pts * 0.5)}-{Math.round(pts * 0.79)}</td>
                    <td style={{ padding: "0.5rem 0.8rem", border: `1px solid ${colors.light}` }}>&lt; {Math.round(pts * 0.5)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <p className="no-print" style={{ fontSize: "0.78rem", color: "#999", marginTop: "1rem", textAlign: "center" }}>
        Ceci n'est pas un diagnostic médical. Seul un professionnel qualifié peut établir un diagnostic clinique.
      </p>
    </div>
  );
}

function RemediationCard({ item }) {
  return (
    <div style={{ border: `1px solid ${colors.light}`, borderRadius: 10, padding: "1.1rem 1.3rem", marginBottom: "0.9rem", background: "white" }}>
      <h4 style={{ margin: "0 0 0.5rem", color: colors.primary, fontSize: "1rem" }}>{item.competence}</h4>
      <p style={{ margin: "0 0 0.6rem", fontSize: "0.88rem", color: colors.dark }}><strong>Objectif :</strong> {item.objectif}</p>
      <p style={{ margin: "0 0 0.3rem", fontSize: "0.85rem", fontWeight: 600, color: colors.accent }}>Activités proposées :</p>
      <ul style={{ margin: "0 0 0.6rem", paddingLeft: "1.3rem", fontSize: "0.86rem", color: colors.dark }}>
        {item.activites.map((a, i) => <li key={i} style={{ marginBottom: "0.2rem" }}>{a}</li>)}
      </ul>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.5rem", fontSize: "0.82rem", background: colors.bg, borderRadius: 8, padding: "0.6rem 0.8rem" }}>
        <div><strong>Matériel :</strong><br/>{item.materiel}</div>
        <div><strong>Durée :</strong><br/>{item.duree}</div>
        <div><strong>Fréquence :</strong><br/>{item.frequence}</div>
      </div>
      <p style={{ margin: "0.6rem 0 0", fontSize: "0.84rem", color: colors.dark }}><strong>Indicateur de réussite :</strong> {item.indicateurs}</p>
    </div>
  );
}

function RemediationView() {
  const [domaine, setDomaine] = useState("lecture");
  const domaines = [
    { id: "lecture", label: "Lecture", icon: "📖" },
    { id: "ecriture", label: "Écriture", icon: "✍️" },
    { id: "mathematiques", label: "Mathématiques", icon: "🔢" },
  ];
  const data = REMEDIATION_TEMPLATES[domaine];

  return (
    <div id="printable-area">
      <div className="no-print" style={{ display: "flex", gap: "0.6rem", marginBottom: "1.3rem" }}>
        {domaines.map(d => (
          <button key={d.id} onClick={() => setDomaine(d.id)}
            style={{ flex: 1, background: domaine === d.id ? colors.primary : "white", color: domaine === d.id ? "white" : colors.dark, border: `2px solid ${domaine === d.id ? colors.primary : colors.light}`, borderRadius: 10, padding: "0.7rem", cursor: "pointer", fontWeight: 600, fontSize: "0.9rem" }}>
            {d.icon} {d.label}
          </button>
        ))}
      </div>

      <div style={{ background: "white", borderRadius: 12, padding: "1.4rem 1.5rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderLeft: `4px solid ${colors.accent}` }}>
        <h2 style={{ margin: "0 0 1rem", color: colors.primary, fontSize: "1.25rem" }}>{data.titre}</h2>
        {data.items.map((item, i) => <RemediationCard key={i} item={item} />)}
      </div>

      <p className="no-print" style={{ fontSize: "0.78rem", color: "#999", marginTop: "1rem", textAlign: "center" }}>
        Ces plans sont des modèles génériques à adapter selon le profil réel de l'élève.
      </p>
    </div>
  );
}

function App() {
  const [view, setView] = useState("tests");
  const [niveau, setNiveau] = useState("CP1");

  return (
    <div style={{ minHeight: "100vh", background: colors.bg, color: colors.dark }}>
      <Header view={view} setView={setView} />
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "1.5rem 1rem" }}>
        {view === "tests" && (
          <>
            <NiveauSelector niveau={niveau} setNiveau={setNiveau} />
            <div className="no-print" style={{ textAlign: "right", marginBottom: "1rem" }}>
              <button onClick={() => window.print()}
                style={{ fontSize: "0.85rem", padding: "0.5rem 1rem", borderRadius: 8, border: `1px solid ${colors.light}`, background: "white", color: colors.primary, cursor: "pointer", fontWeight: 600 }}>
                📄 Exporter / Imprimer en PDF
              </button>
            </div>
            <TestView niveau={niveau} />
          </>
        )}
        {view === "remediation" && (
          <>
            <div className="no-print" style={{ textAlign: "right", marginBottom: "1rem" }}>
              <button onClick={() => window.print()}
                style={{ fontSize: "0.85rem", padding: "0.5rem 1rem", borderRadius: 8, border: `1px solid ${colors.light}`, background: "white", color: colors.primary, cursor: "pointer", fontWeight: 600 }}>
                📄 Exporter / Imprimer en PDF
              </button>
            </div>
            <RemediationView />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
