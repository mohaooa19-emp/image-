<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnosticien Pédagogique Expert — CP1 → CM2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  @media print {
    body * { visibility: hidden; }
    #printable-output, #printable-output * { visibility: visible; }
    #printable-output {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      padding: 1.5rem;
      box-shadow: none !important;
      border: none !important;
    }
    #printable-output .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef } = React;

const NIVEAUX = ["CP1", "CP2", "CE1", "CE2", "CM1", "CM2"];

const systemPrompt = `Tu es un expert international en évaluation diagnostique des apprentissages fondamentaux spécialisé en Lecture, Écriture et Mathématiques pour les élèves du CP1 au CM2 en contexte guinéen francophone.

Tu maîtrises : l'approche par compétences, l'évaluation diagnostique, la remédiation pédagogique, et les programmes guinéens INRAP du primaire.

RÈGLES ABSOLUES :
- Utiliser des prénoms guinéens : Mamadou, Fatoumata, Aïssatou, Ibrahima, Mariama, Ousmane
- Utiliser des contextes locaux : école, famille, marché, champ, village, quartier
- Adapter rigoureusement au niveau scolaire indiqué
- Produire du contenu directement utilisable par un enseignant
- Ne jamais faire de diagnostic médical
- Toujours ajouter : « Ceci n'est pas un diagnostic médical. Seul un professionnel qualifié peut établir un diagnostic clinique. » si des troubles d'apprentissage sont évoqués

FORMAT DE SORTIE : Markdown structuré avec des sections claires, des tableaux et des listes.`;

const MODES = [
  { id: "test", label: "Générer un test", icon: "📝", desc: "Créer un test diagnostique complet" },
  { id: "correction", label: "Analyser les résultats", icon: "📊", desc: "Analyser les résultats et produire un plan de remédiation" },
  { id: "remediation", label: "Plan de remédiation", icon: "🔧", desc: "Générer un plan de remédiation ciblé" },
];

const HISTORY_KEY = "diagnostic-evaluations-history";
const API_KEY_STORAGE = "diagnostic-anthropic-api-key";
const MAX_HISTORY = 25;

function MarkdownRenderer({ text }) {
  const lines = text.split("\n");
  const elements = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    if (line.startsWith("# ")) {
      elements.push(<h1 key={i} style={{ fontSize: "1.4rem", fontWeight: 700, color: "#1a3a2a", marginTop: "1.5rem", marginBottom: "0.5rem", borderBottom: "2px solid #2d6a4f", paddingBottom: "0.4rem" }}>{line.slice(2)}</h1>);
    } else if (line.startsWith("## ")) {
      elements.push(<h2 key={i} style={{ fontSize: "1.15rem", fontWeight: 700, color: "#2d6a4f", marginTop: "1.2rem", marginBottom: "0.4rem" }}>{line.slice(3)}</h2>);
    } else if (line.startsWith("### ")) {
      elements.push(<h3 key={i} style={{ fontSize: "1rem", fontWeight: 600, color: "#40916c", marginTop: "1rem", marginBottom: "0.3rem" }}>{line.slice(4)}</h3>);
    } else if (line.startsWith("---")) {
      elements.push(<hr key={i} style={{ border: "none", borderTop: "1px solid #d8f3dc", margin: "1rem 0" }} />);
    } else if (line.startsWith("- ") || line.startsWith("* ")) {
      elements.push(<li key={i} style={{ marginLeft: "1.2rem", marginBottom: "0.2rem", color: "#1b4332" }}>{renderInline(line.slice(2))}</li>);
    } else if (/^\d+\.\s/.test(line)) {
      elements.push(<li key={i} style={{ marginLeft: "1.2rem", marginBottom: "0.2rem", listStyleType: "decimal", color: "#1b4332" }}>{renderInline(line.replace(/^\d+\.\s/, ""))}</li>);
    } else if (line.startsWith("|")) {
      const tableLines = [];
      while (i < lines.length && lines[i].startsWith("|")) {
        tableLines.push(lines[i]);
        i++;
      }
      elements.push(renderTable(tableLines, i));
      continue;
    } else if (line.trim() !== "") {
      elements.push(<p key={i} style={{ marginBottom: "0.5rem", color: "#1b4332", lineHeight: 1.6 }}>{renderInline(line)}</p>);
    }
    i++;
  }

  return <div style={{ fontFamily: "'Segoe UI', sans-serif" }}>{elements}</div>;
}

function renderInline(text) {
  const parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) return <strong key={i}>{part.slice(2, -2)}</strong>;
    if (part.startsWith("*") && part.endsWith("*")) return <em key={i}>{part.slice(1, -1)}</em>;
    if (part.startsWith("`") && part.endsWith("`")) return <code key={i} style={{ background: "#d8f3dc", padding: "0.1rem 0.3rem", borderRadius: "3px", fontSize: "0.9em" }}>{part.slice(1, -1)}</code>;
    return part;
  });
}

function renderTable(lines, keyBase) {
  const rows = lines.filter(l => !l.match(/^\|[\s\-|]+\|$/));
  const cells = rows.map(row => row.split("|").filter((_, i, a) => i > 0 && i < a.length - 1).map(c => c.trim()));

  return (
    <div key={keyBase} style={{ overflowX: "auto", margin: "0.8rem 0" }}>
      <table style={{ borderCollapse: "collapse", width: "100%", fontSize: "0.9rem" }}>
        <tbody>
          {cells.map((row, ri) => (
            <tr key={ri} style={{ background: ri === 0 ? "#2d6a4f" : ri % 2 === 0 ? "#f0faf4" : "white" }}>
              {row.map((cell, ci) => {
                const Tag = ri === 0 ? "th" : "td";
                return <Tag key={ci} style={{ border: "1px solid #b7e4c7", padding: "0.4rem 0.7rem", color: ri === 0 ? "white" : "#1b4332", textAlign: "left", fontWeight: ri === 0 ? 600 : 400 }}>{cell}</Tag>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) + " · " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

function DiagnosticienPedagogique() {
  const [mode, setMode] = useState("test");
  const [niveau, setNiveau] = useState("CP1");
  const [niveauReel, setNiveauReel] = useState("");
  const [domaines, setDomaines] = useState(["Lecture", "Écriture", "Mathématiques"]);
  const [contexte, setContexte] = useState("");
  const [resultats, setResultats] = useState("");
  const [lacunes, setLacunes] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [history, setHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const printRef = useRef(null);

  // Load history & API key on mount
  useEffect(() => {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) setHistory(JSON.parse(raw));
    } catch (e) {}
    try {
      const key = localStorage.getItem(API_KEY_STORAGE);
      if (key) setApiKey(key);
    } catch (e) {}
  }, []);

  const saveApiKey = (key) => {
    setApiKey(key);
    try { localStorage.setItem(API_KEY_STORAGE, key); } catch (e) {}
  };

  const saveToHistory = (entry) => {
    const updated = [entry, ...history].slice(0, MAX_HISTORY);
    setHistory(updated);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(updated)); } catch (e) {}
  };

  const deleteHistoryItem = (id) => {
    const updated = history.filter(h => h.id !== id);
    setHistory(updated);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(updated)); } catch (e) {}
  };

  const clearHistory = () => {
    setHistory([]);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify([])); } catch (e) {}
  };

  const loadFromHistory = (entry) => {
    setMode(entry.mode);
    setNiveau(entry.niveau);
    setNiveauReel(entry.niveauReel || "");
    setDomaines(entry.domaines || ["Lecture", "Écriture", "Mathématiques"]);
    setContexte(entry.contexte || "");
    setResultats(entry.resultats || "");
    setLacunes(entry.lacunes || "");
    setOutput(entry.output);
    setShowHistory(false);
    setError("");
  };

  const toggleDomaine = (d) => {
    setDomaines(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]);
  };

  const buildPrompt = () => {
    const domainesStr = domaines.join(", ");
    const niveauReelStr = niveauReel ? ` (niveau réel supposé : ${niveauReel})` : "";

    if (mode === "test") {
      return `Génère un TEST DIAGNOSTIQUE COMPLET pour un élève de ${niveau}${niveauReelStr}.

Domaines à évaluer : ${domainesStr}
${contexte ? `Contexte particulier : ${contexte}` : ""}

Produis dans l'ordre :
1. TEST COMPLET (exercices numérotés, consignes claires, espaces réponse)
2. GRILLE DE CORRECTION (critères précis par exercice)
3. BARÈME DÉTAILLÉ (points par item)
4. TABLEAU DE SYNTHÈSE (compétences évaluées / points / seuils d'acquisition)

Utilise des prénoms guinéens et des contextes locaux. Sois précis et directement utilisable par un enseignant.`;
    }

    if (mode === "correction") {
      return `Analyse les résultats suivants d'un élève de ${niveau}${niveauReelStr} :

Résultats obtenus : ${resultats || "(non précisés — produis une grille d'analyse type)"}
${lacunes ? `Difficultés observées : ${lacunes}` : ""}

Produis :
1. COMPÉTENCES MAÎTRISÉES (liste détaillée)
2. COMPÉTENCES FRAGILES (liste détaillée)
3. COMPÉTENCES NON ACQUISES (liste détaillée)
4. ANALYSE DES ERREURS (lecture, écriture, mathématiques selon les domaines concernés)
5. HYPOTHÈSES PÉDAGOGIQUES (causes probables des difficultés)
6. PLAN DE REMÉDIATION (objectif / activités / durée / fréquence / indicateurs de réussite)

Note : Ceci n'est pas un diagnostic médical.`;
    }

    if (mode === "remediation") {
      return `Génère un PLAN DE REMÉDIATION DÉTAILLÉ pour un élève de ${niveau}${niveauReelStr}.

Domaines ciblés : ${domainesStr}
${lacunes ? `Lacunes identifiées : ${lacunes}` : ""}
${contexte ? `Contexte : ${contexte}` : ""}

Pour chaque compétence à remédier, produis :
- Objectif précis
- 3 à 5 activités progressives avec consignes détaillées
- Matériel nécessaire (adapté au contexte guinéen)
- Durée et fréquence recommandées
- Indicateurs de réussite mesurables
- Critères de passage à l'étape suivante

Utilise des prénoms et contextes guinéens. Sois directement applicable en classe.`;
    }
  };

  const generate = async () => {
    if (domaines.length === 0) { setError("Sélectionnez au moins un domaine."); return; }
    if (!apiKey) { setError("Veuillez renseigner votre clé API Anthropic dans les paramètres (⚙️)."); setShowSettings(true); return; }
    setError("");
    setOutput("");
    setLoading(true);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 4000,
          system: systemPrompt,
          messages: [{ role: "user", content: buildPrompt() }],
        }),
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(errBody?.error?.message || `Erreur HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data.content?.map(b => b.text || "").join("\n") || "";
      setOutput(text);

      const entry = {
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        date: new Date().toISOString(),
        mode, niveau, niveauReel, domaines, contexte, resultats, lacunes,
        output: text,
      };
      saveToHistory(entry);
    } catch (e) {
      setError("Erreur : " + (e.message || "impossible de contacter l'API. Vérifiez votre clé API."));
    } finally {
      setLoading(false);
    }
  };

  const exportPDF = () => {
    window.print();
  };

  const colors = { bg: "#f0faf4", card: "#ffffff", primary: "#2d6a4f", accent: "#52b788", light: "#d8f3dc", dark: "#1b4332", muted: "#74c69d" };

  return (
    <div style={{ minHeight: "100vh", background: colors.bg, fontFamily: "'Segoe UI', system-ui, sans-serif", color: colors.dark }}>

      {/* Header */}
      <div className="no-print" style={{ background: colors.primary, color: "white", padding: "1.5rem 2rem", boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "0.6rem" }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: "0.8rem", marginBottom: "0.3rem" }}>
              <span style={{ fontSize: "1.8rem" }}>🎓</span>
              <h1 style={{ margin: 0, fontSize: "1.4rem", fontWeight: 700, letterSpacing: "-0.01em" }}>Diagnosticien Pédagogique Expert</h1>
            </div>
            <p style={{ margin: 0, fontSize: "0.88rem", opacity: 0.85 }}>Évaluation diagnostique CP1 → CM2 · Programmes guinéens INRAP</p>
          </div>
          <div style={{ display: "flex", gap: "0.5rem" }}>
            <button onClick={() => { setShowSettings(s => !s); setShowHistory(false); }}
              style={{ background: showSettings ? "white" : "rgba(255,255,255,0.15)", color: showSettings ? colors.primary : "white", border: "1.5px solid rgba(255,255,255,0.4)", borderRadius: 8, padding: "0.5rem 0.7rem", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer" }}>
              ⚙️
            </button>
            <button onClick={() => { setShowHistory(s => !s); setShowSettings(false); }}
              style={{ background: showHistory ? "white" : "rgba(255,255,255,0.15)", color: showHistory ? colors.primary : "white", border: "1.5px solid rgba(255,255,255,0.4)", borderRadius: 8, padding: "0.5rem 0.9rem", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              🕘 Historique {history.length > 0 ? `(${history.length})` : ""}
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "1.5rem 1rem" }}>

        {/* Settings panel */}
        {showSettings && (
          <div className="no-print" style={{ background: "white", borderRadius: 12, padding: "1.2rem 1.4rem", marginBottom: "1.2rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
            <h2 style={{ margin: "0 0 0.5rem", fontSize: "1rem", fontWeight: 700, color: colors.primary }}>Paramètres</h2>
            <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Clé API Anthropic</label>
            <input type="password" value={apiKey} onChange={e => saveApiKey(e.target.value)}
              placeholder="sk-ant-..."
              style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.9rem", boxSizing: "border-box", fontFamily: "monospace" }} />
            <p style={{ fontSize: "0.78rem", color: "#888", marginTop: "0.5rem", marginBottom: 0 }}>
              Votre clé est stockée uniquement dans le stockage local de votre navigateur et n'est jamais envoyée ailleurs qu'à l'API Anthropic.
              Obtenez une clé sur <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer" style={{ color: colors.primary }}>console.anthropic.com</a>.
            </p>
          </div>
        )}

        {/* History panel */}
        {showHistory && (
          <div className="no-print" style={{ background: "white", borderRadius: 12, padding: "1.2rem 1.4rem", marginBottom: "1.2rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.8rem" }}>
              <h2 style={{ margin: 0, fontSize: "1rem", fontWeight: 700, color: colors.primary }}>Évaluations précédentes</h2>
              {history.length > 0 && (
                <button onClick={clearHistory}
                  style={{ fontSize: "0.78rem", padding: "0.3rem 0.6rem", borderRadius: 6, border: `1px solid #f5c2c7`, background: "#fff5f5", color: "#c0392b", cursor: "pointer" }}>
                  🗑 Tout effacer
                </button>
              )}
            </div>

            {history.length === 0 && (
              <p style={{ fontSize: "0.88rem", color: "#888" }}>Aucune évaluation enregistrée pour le moment. Générez un test pour commencer.</p>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>
              {history.map(h => (
                <div key={h.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", border: `1px solid ${colors.light}`, borderRadius: 8, padding: "0.6rem 0.8rem", gap: "0.6rem" }}>
                  <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={() => loadFromHistory(h)}>
                    <div style={{ fontWeight: 600, fontSize: "0.88rem", color: colors.dark }}>
                      {MODES.find(m => m.id === h.mode)?.icon} {MODES.find(m => m.id === h.mode)?.label} · {h.niveau}{h.niveauReel ? ` (réel: ${h.niveauReel})` : ""}
                    </div>
                    <div style={{ fontSize: "0.76rem", color: "#888" }}>{formatDate(h.date)} · {h.domaines?.join(", ")}</div>
                  </div>
                  <button onClick={() => deleteHistoryItem(h.id)}
                    style={{ border: "none", background: "transparent", color: "#c0392b", cursor: "pointer", fontSize: "1rem", padding: "0.2rem" }}
                    title="Supprimer">✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Mode selector */}
        <div className="no-print" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.7rem", marginBottom: "1.5rem" }}>
          {MODES.map(m => (
            <button key={m.id} onClick={() => { setMode(m.id); setOutput(""); }}
              style={{ background: mode === m.id ? colors.primary : "white", color: mode === m.id ? "white" : colors.dark, border: `2px solid ${mode === m.id ? colors.primary : colors.light}`, borderRadius: 10, padding: "0.8rem 0.6rem", cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
              <div style={{ fontSize: "1.3rem", marginBottom: "0.25rem" }}>{m.icon}</div>
              <div style={{ fontWeight: 600, fontSize: "0.88rem" }}>{m.label}</div>
              <div style={{ fontSize: "0.77rem", opacity: 0.75, marginTop: "0.15rem" }}>{m.desc}</div>
            </button>
          ))}
        </div>

        {/* Config panel */}
        <div className="no-print" style={{ background: "white", borderRadius: 12, padding: "1.2rem 1.4rem", marginBottom: "1.2rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem", marginBottom: "1rem" }}>
            <div>
              <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Niveau scolaire officiel</label>
              <select value={niveau} onChange={e => setNiveau(e.target.value)}
                style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.95rem", color: colors.dark, background: "white" }}>
                {NIVEAUX.map(n => <option key={n}>{n}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Niveau réel supposé <span style={{ fontWeight: 400, opacity: 0.7 }}>(optionnel)</span></label>
              <select value={niveauReel} onChange={e => setNiveauReel(e.target.value)}
                style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.95rem", color: colors.dark, background: "white" }}>
                <option value="">— Même que le niveau officiel</option>
                {NIVEAUX.map(n => <option key={n}>{n}</option>)}
              </select>
            </div>
          </div>

          {/* Domaines */}
          <div style={{ marginBottom: "1rem" }}>
            <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.4rem" }}>Domaines à évaluer</label>
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
              {["Lecture", "Écriture", "Mathématiques"].map(d => (
                <button key={d} onClick={() => toggleDomaine(d)}
                  style={{ padding: "0.35rem 0.85rem", borderRadius: 20, border: `1.5px solid ${domaines.includes(d) ? colors.primary : colors.light}`, background: domaines.includes(d) ? colors.light : "white", color: domaines.includes(d) ? colors.primary : "#888", fontWeight: domaines.includes(d) ? 600 : 400, fontSize: "0.88rem", cursor: "pointer" }}>
                  {d}
                </button>
              ))}
            </div>
          </div>

          {/* Résultats / lacunes selon le mode */}
          {mode === "correction" && (
            <div style={{ marginBottom: "0.8rem" }}>
              <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Résultats obtenus <span style={{ fontWeight: 400, opacity: 0.7 }}>(scores, observations)</span></label>
              <textarea value={resultats} onChange={e => setResultats(e.target.value)} rows={3}
                placeholder="Ex : Lecture 12/40 — ne décode pas les syllabes complexes. Maths 18/30. Écriture 8/30..."
                style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.9rem", resize: "vertical", boxSizing: "border-box" }} />
            </div>
          )}

          {(mode === "correction" || mode === "remediation") && (
            <div style={{ marginBottom: "0.8rem" }}>
              <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Difficultés / lacunes identifiées <span style={{ fontWeight: 400, opacity: 0.7 }}>(optionnel)</span></label>
              <textarea value={lacunes} onChange={e => setLacunes(e.target.value)} rows={2}
                placeholder="Ex : confusion b/d, ne mémorise pas les tables, inversions en écriture..."
                style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.9rem", resize: "vertical", boxSizing: "border-box" }} />
            </div>
          )}

          <div>
            <label style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.primary, display: "block", marginBottom: "0.3rem" }}>Contexte particulier <span style={{ fontWeight: 400, opacity: 0.7 }}>(optionnel)</span></label>
            <input value={contexte} onChange={e => setContexte(e.target.value)}
              placeholder="Ex : élève en zone rurale, absence prolongée, primo-arrivant..."
              style={{ width: "100%", padding: "0.55rem 0.7rem", borderRadius: 8, border: `1.5px solid ${colors.light}`, fontSize: "0.9rem", boxSizing: "border-box" }} />
          </div>
        </div>

        {/* CTA */}
        {error && <div className="no-print" style={{ background: "#fff0f0", border: "1px solid #fcc", borderRadius: 8, padding: "0.6rem 1rem", marginBottom: "0.8rem", fontSize: "0.88rem", color: "#c0392b" }}>{error}</div>}

        <button className="no-print" onClick={generate} disabled={loading}
          style={{ width: "100%", padding: "0.9rem", borderRadius: 10, border: "none", background: loading ? colors.muted : colors.primary, color: "white", fontSize: "1rem", fontWeight: 700, cursor: loading ? "not-allowed" : "pointer", transition: "background 0.15s", marginBottom: "1.5rem" }}>
          {loading ? "⏳ Génération en cours…" : MODES.find(m => m.id === mode)?.icon + " " + MODES.find(m => m.id === mode)?.label}
        </button>

        {/* Output */}
        {output && (
          <div id="printable-output" ref={printRef} style={{ background: "white", borderRadius: 12, padding: "1.5rem 1.6rem", boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderLeft: `4px solid ${colors.accent}` }}>
            <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", flexWrap: "wrap", gap: "0.5rem" }}>
              <span style={{ fontSize: "0.82rem", fontWeight: 600, color: colors.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>Résultat généré</span>
              <div style={{ display: "flex", gap: "0.5rem" }}>
                <button onClick={() => navigator.clipboard?.writeText(output)}
                  style={{ fontSize: "0.8rem", padding: "0.3rem 0.7rem", borderRadius: 6, border: `1px solid ${colors.light}`, background: "white", color: colors.primary, cursor: "pointer" }}>
                  📋 Copier
                </button>
                <button onClick={exportPDF}
                  style={{ fontSize: "0.8rem", padding: "0.3rem 0.7rem", borderRadius: 6, border: `1px solid ${colors.light}`, background: "white", color: colors.primary, cursor: "pointer" }}>
                  📄 Exporter PDF
                </button>
              </div>
            </div>
            <MarkdownRenderer text={output} />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DiagnosticienPedagogique />);

</script>
</body>
</html>
